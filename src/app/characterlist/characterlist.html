<h2>Characters</h2>
<p>Total Characters Shown: {{ selectedCount() }}</p>
<app-characterfilter (houseSelected)="filterByHouse($event)"></app-characterfilter>

<app-characterdetails [character]="selectedCharacter"></app-characterdetails>

<div class="character-grid">
  @for (character of characters; track character.id) {
    <div class="character-card" (click)="viewDetails(character.id)">
      @if (character.image) {
        <img
          [src]="character.image"
          [alt]="character.name"
        />
      }

      <h3>{{ character.name }}</h3>
      <p><strong>House:</strong> {{ character.house || 'No House' }}</p>
    </div>
  }
</div>
